{% extends "client/layout_client.html" %}
{% block body %}
<div class="container mt-3">
  <h3>Ajouter une adresse</h3>
  <form action="/client/coordonnee/add_adresse" method="post">
    <div class="mb-2"><label>Nom / Destinataire</label>
      <input type="text" name="nom" class="form-control" value="{{ nom|default('') }}" required></div>
    <div class="mb-2"><label>Rue</label>
      <input type="text" name="rue" class="form-control" value="{{ rue|default('') }}" required></div>
    <div class="mb-2"><label>Code postal</label>
      <input type="text" name="code_postal" class="form-control" value="{{ code_postal|default('') }}" maxlength="5" required></div>
    <div class="mb-2"><label>Ville</label>
      <input type="text" name="ville" class="form-control" value="{{ ville|default('') }}" required></div>
    <button class="btn btn-success">Ajouter</button>
    <a class="btn btn-secondary" href="/client/coordonnee/show">Annuler</a>
  </form>
</div>
{% endblock %}
