{% extends "client/layout_client.html" %}
{% block body %}
<div class="container mt-3">
  <h3>Modifier mes informations</h3>
  <form action="/client/coordonnee/edit" method="post">
    <div class="mb-2"><label>Nom</label>
      <input type="text" name="nom" class="form-control" value="{{ utilisateur.nom if utilisateur else '' }}" required></div>
    <div class="mb-2"><label>Login</label>
      <input type="text" name="login" class="form-control" value="{{ utilisateur.login if utilisateur else '' }}" required></div>
    <div class="mb-2"><label>Email</label>
      <input type="email" name="email" class="form-control" value="{{ utilisateur.email if utilisateur else '' }}" required></div>
    <button class="btn btn-warning">Enregistrer</button>
    <a class="btn btn-secondary" href="/client/coordonnee/show">Annuler</a>
  </form>
</div>
{% endblock %}
