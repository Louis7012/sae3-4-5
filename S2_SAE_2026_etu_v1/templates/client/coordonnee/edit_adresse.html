{% extends "client/layout_client.html" %}
{% block body %}
<div class="container mt-3">
  <h3>Modifier l'adresse</h3>
  <form action="/client/coordonnee/edit_adresse" method="post">
    <input type="hidden" name="id_adresse" value="{{ adresse.id_adresse }}">
    <div class="mb-2"><label>Nom / Destinataire</label>
      <input type="text" name="nom" class="form-control" value="{{ adresse.nom }}" required></div>
    <div class="mb-2"><label>Rue</label>
      <input type="text" name="rue" class="form-control" value="{{ adresse.rue }}" required></div>
    <div class="mb-2"><label>Code postal</label>
      <input type="text" name="code_postal" class="form-control" value="{{ adresse.code_postal }}" maxlength="5" required></div>
    <div class="mb-2"><label>Ville</label>
      <input type="text" name="ville" class="form-control" value="{{ adresse.ville }}" required></div>
    <button class="btn btn-warning">Enregistrer</button>
    <a class="btn btn-secondary" href="/client/coordonnee/show">Annuler</a>
  </form>
</div>
{% endblock %}
