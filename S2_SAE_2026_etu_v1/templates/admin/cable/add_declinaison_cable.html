{% extends 'admin/layout_admin.html' %}
{% block body %}
<div class="container mt-3">
<h3>Ajouter une déclinaison pour : {{ cable.nom_cable if cable else '' }}</h3>
<form action="/admin/declinaison_cable/add" method="post">
  <input type="hidden" name="id_cable" value="{{ cable.id_cable if cable else '' }}">
  <div class="mb-2"><label>Longueur</label>
    <select name="longueur_id" class="form-control">
      {% for l in longueurs %}
        <option value="{{ l.id_longueur }}">{{ l.nom_longueur }}</option>
      {% endfor %}
    </select></div>
  <div class="mb-2"><label>Couleur</label>
    <select name="couleur_id" class="form-control" {% if d_unique %}disabled{% endif %}>
      {% for c in couleurs %}
        {% if not d_unique or c.id_couleur == 1 %}
          <option value="{{ c.id_couleur }}">{{ c.nom_couleur }}</option>
        {% endif %}
      {% endfor %}
    </select>
    {% if d_unique %}<small class="text-warning">Déclinaison unique déjà définie.</small>{% endif %}
  </div>
  <div class="mb-2"><label>Stock</label>
    <input type="number" name="stock" class="form-control" value="0" min="0" required></div>
  <div class="mb-2"><label>Prix (€)</label>
    <input type="number" step="0.01" name="prix" class="form-control" required></div>
  <button class="btn btn-success" {% if d_unique %}disabled{% endif %}>Ajouter</button>
  <a class="btn btn-secondary" href="/admin/cable/edit?id_cable={{ cable.id_cable if cable else '' }}">Annuler</a>
</form>
</div>
{% endblock %}
