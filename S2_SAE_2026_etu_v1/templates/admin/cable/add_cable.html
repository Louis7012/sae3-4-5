{% extends 'admin/layout_admin.html' %}
{% block title %}<title>Ajouter un câble</title>{% endblock %}
{% block body %}
<div class="container mt-3">
  <h2>Ajouter un câble</h2>
  <form method="post" action="/admin/cable/add" enctype="multipart/form-data" class="w-50">
    <div class="mb-2">
      <label>Nom</label>
      <input name="nom" type="text" class="form-control" required>
    </div>
    <div class="mb-2">
      <label>Prix (€)</label>
      <input name="prix" type="number" step="0.01" min="0" class="form-control" required>
    </div>
    <div class="mb-2">
      <label>Blindage</label>
      <select name="blindage" class="form-control">
        <option value="Oui">Oui</option>
        <option value="Non">Non</option>
      </select>
    </div>
    <div class="mb-2">
      <label>Fournisseur</label>
      <input name="fournisseur" type="text" class="form-control">
    </div>
    <div class="mb-2">
      <label>Marque</label>
      <input name="marque" type="text" class="form-control">
    </div>
    <div class="mb-2">
      <label>Stock initial</label>
      <input name="stock" type="number" min="0" class="form-control" value="0">
    </div>
    <div class="mb-2">
      <label>Type de prise</label>
      <select name="type_prise_id" required class="form-select">
        <option value="">— Sélectionner —</option>
        {% for tp in types_prise %}
          <option value="{{ tp.id_type_prise }}">{{ tp.nom_type_prise }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-2">
      <label>Longueur principale</label>
      <select name="longueur_id" required class="form-select">
        {% for l in longueurs %}
          <option value="{{ l.id_longueur }}">{{ l.nom_longueur }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-2">
      <label>Image</label>
      <input name="image" type="file" class="form-control">
    </div>
    <button type="submit" class="btn btn-success">Ajouter</button>
    <a href="/admin/cable/show" class="btn btn-secondary">Annuler</a>
  </form>
</div>
{% endblock %}
