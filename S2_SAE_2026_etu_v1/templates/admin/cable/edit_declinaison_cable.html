{% extends 'admin/layout_admin.html' %}
{% block body %}
<div class="container mt-3">
<h3>Modifier la déclinaison #{{ declinaison_cable.id_declinaison_cable if declinaison_cable else '' }}</h3>
<form action="/admin/declinaison_cable/edit" method="post">
  <input type="hidden" name="id_declinaison_cable" value="{{ declinaison_cable.id_declinaison_cable if declinaison_cable else '' }}">
  <input type="hidden" name="id_cable" value="{{ declinaison_cable.cable_id if declinaison_cable else '' }}">
  <div class="mb-2"><label>Longueur</label>
    <select name="longueur_id" class="form-control">
      {% for l in longueurs %}
        <option value="{{ l.id_longueur }}" {% if declinaison_cable and l.id_longueur==declinaison_cable.longueur_id %}selected{% endif %}>{{ l.nom_longueur }}</option>
      {% endfor %}
    </select></div>
  <div class="mb-2"><label>Couleur</label>
    <select name="couleur_id" class="form-control">
      {% for c in couleurs %}
        <option value="{{ c.id_couleur }}" {% if declinaison_cable and c.id_couleur==declinaison_cable.couleur_id %}selected{% endif %}>{{ c.nom_couleur }}</option>
      {% endfor %}
    </select></div>
  <div class="mb-2"><label>Stock</label>
    <input type="number" name="stock" class="form-control" value="{{ declinaison_cable.stock if declinaison_cable else 0 }}" min="0"></div>
  <div class="mb-2"><label>Prix (€)</label>
    <input type="number" step="0.01" name="prix" class="form-control" value="{{ declinaison_cable.prix if declinaison_cable else '' }}"></div>
  <button class="btn btn-warning">Enregistrer</button>
  <a class="btn btn-secondary" href="/admin/cable/edit?id_cable={{ declinaison_cable.cable_id if declinaison_cable else '' }}">Annuler</a>
</form>
</div>
{% endblock %}
