{% extends 'admin/layout_admin.html' %}
{% block body %}
<div class="container mt-4">
  <h3>Répondre au commentaire</h3>
  <form action="/admin/cable/commentaires/repondre" method="post">
    <input type="hidden" name="id_cable" value="{{ id_cable }}">
    <input type="hidden" name="id_commentaire" value="{{ id_commentaire }}">
    <div class="mb-3">
      <label class="form-label">Votre réponse :</label>
      <textarea name="commentaire" class="form-control" rows="4" required></textarea>
    </div>
    <button class="btn btn-primary">Envoyer la réponse</button>
    <a class="btn btn-secondary" href="/admin/cable/commentaires?id_cable={{ id_cable }}">Annuler</a>
  </form>
</div>
{% endblock %}
