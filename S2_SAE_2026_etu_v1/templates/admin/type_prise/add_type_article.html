{% extends 'admin/layout_admin.html' %}
{% block body %}
<div class="container mt-3">
  <h3>Ajouter un type de prise</h3>
  <form action="/admin/type_prise/add" method="post" class="w-25">
    <div class="mb-2">
      <label>Libellé</label>
      <input type="text" name="libelle" class="form-control" required>
    </div>
    <button class="btn btn-success">Ajouter</button>
    <a class="btn btn-secondary" href="/admin/type_prise/show">Annuler</a>
  </form>
</div>
{% endblock %}
