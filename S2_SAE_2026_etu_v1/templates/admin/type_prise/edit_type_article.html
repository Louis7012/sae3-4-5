{% extends 'admin/layout_admin.html' %}
{% block body %}
<div class="container mt-3">
  <h3>Modifier le type de prise</h3>
  <form action="/admin/type_prise/edit" method="post" class="w-25">
    <input type="hidden" name="id_type_prise" value="{{ type_article.id_type_prise if type_article else '' }}">
    <div class="mb-2">
      <label>Libellé</label>
      <input type="text" name="libelle" class="form-control"
             value="{{ type_article.nom_type_prise if type_article else '' }}" required>
    </div>
    <button class="btn btn-warning">Enregistrer</button>
    <a class="btn btn-secondary" href="/admin/type_prise/show">Annuler</a>
  </form>
</div>
{% endblock %}
